<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src http://127.0.0.1:*" />
  <title>flux</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Title bar -->
    <div id="titlebar">
      <span class="logo">⚡</span>
      <span>flux</span>
    </div>

    <!-- Sidebar -->
    <div id="sidebar">
      <div id="sidebar-header">
        <button id="btn-new-session">+ New Session</button>
      </div>
      <div id="session-list"></div>
    </div>

    <!-- Chat -->
    <div id="chat">
      <div id="chat-header">
        <span class="session-path" id="session-path">No session</span>
        <button id="clear-btn">Clear</button>
      </div>
      <div id="messages">
        <div id="empty-state">
          <div class="logo">⚡</div>
          <h2>flux</h2>
          <p>Create a new session or select one from the sidebar to start chatting.</p>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div id="input-area">
      <textarea
        id="prompt-input"
        placeholder="Type a message… (Enter to send, Shift+Enter for newline)"
        rows="1"
      ></textarea>
      <button id="send-btn" disabled>Send</button>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
